workflows:
  flutter-ios-release:
    name: Flutter iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: 26.4.x
      cocoapods: default

    scripts:
      - name: Flutter version
        script: flutter --version

      - name: Get packages
        script: flutter pub get

      - name: Install Pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build unsigned Runner.app
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Pack Runner.app
        script: |
          mkdir export

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name Runner.app | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found!"
            exit 1
          fi

          cp -R "$APP_PATH" export/Runner.app

          cd export
          zip -r Runner.zip Runner.app

    artifacts:
      - export/Runner.zip
      - /tmp/xcodebuild_logs/*.log
